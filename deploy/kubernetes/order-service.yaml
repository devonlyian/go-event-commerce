apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: commerce
data:
  HTTP_PORT: "8080"
  KAFKA_BROKERS: "host.docker.internal:29092"
  KAFKA_TOPIC_ORDER_CREATED: "order.created"
---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: commerce
type: Opaque
stringData:
  POSTGRES_DSN: "host=host.docker.internal user=commerce password=commerce dbname=commerce port=5432 sslmode=disable TimeZone=UTC"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: commerce
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
