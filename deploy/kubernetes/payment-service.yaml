apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: commerce
data:
  HTTP_PORT: "8081"
  KAFKA_BROKERS: "host.docker.internal:29092"
  KAFKA_TOPIC_ORDER_CREATED: "order.created"
  KAFKA_TOPIC_PAYMENT_COMPLETED: "payment.completed"
  KAFKA_TOPIC_PAYMENT_FAILED: "payment.failed"
  KAFKA_GROUP_ID: "payment-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: commerce
type: Opaque
stringData:
  PAYMENT_PROVIDER_API_KEY: "replace-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:dev
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret
          livenessProbe:
            httpGet:
              path: /livez
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: commerce
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
