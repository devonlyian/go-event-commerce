apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: commerce
data:
  HTTP_PORT: "8082"
  KAFKA_BROKERS: "host.docker.internal:29092"
  KAFKA_TOPICS: "payment.completed,payment.failed"
  KAFKA_GROUP_ID: "notification-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: commerce
type: Opaque
stringData:
  NOTIFICATION_API_TOKEN: "replace-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:dev
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
          livenessProbe:
            httpGet:
              path: /livez
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: commerce
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  type: ClusterIP
